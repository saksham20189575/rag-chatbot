name: Refresh corpus

"on":
  schedule:
    # Daily 10:30 AM IST (05:00 UTC). GitHub cron uses UTC.
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-corpus
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-bge-small

      - name: Refresh corpus
        run: python scripts/refresh_corpus.py --trigger github_actions

      - name: Commit refreshed corpus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/raw data/parsed data/chunks data/index data/refresh_manifest.json
          git diff --staged --quiet || git commit -m "chore: refresh Groww corpus [skip ci]"
          git push
